<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#0b0b0d; }

  /* 1080x1350 @ 4:5  — rendered at 2x via deviceScaleFactor */
  #stage {
    width:1080px; height:1350px;
    background:#0b0b0d;
    position:relative;
    display:flex; flex-direction:column;
    justify-content:center; align-items:center;
    font-family:'SF Pro Display', 'SF Pro Text', -apple-system, sans-serif;
    overflow:hidden;
  }
  #stage::before {
    content:''; position:absolute;
    width:1400px; height:1400px;
    background:radial-gradient(circle, rgba(255,255,255,.07) 0%, transparent 62%);
    top:42%; left:50%; transform:translate(-50%,-50%); pointer-events:none;
  }

  /* explicit size so absolutely-positioned children have a reference box */
  .card-stack { position:relative; width:620px; height:620px; margin-bottom:20px; }
  .card {
    position:absolute; inset:0;
    border-radius:24%;
    overflow:hidden;
    filter:drop-shadow(0 32px 64px rgba(0,0,0,.65));
    background:#111;
  }
  .card img { width:100%; height:100%; object-fit:cover; display:block; }

  .attrib { display:flex; align-items:center; gap:18px; margin-top:14px; margin-bottom:48px; }
  .a-icon {
    width:64px; height:64px; border-radius:50%; overflow:hidden;
    background:var(--accent,#f5b301); display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:22px; color:#000; flex-shrink:0;
  }
  .a-icon img { width:100%; height:100%; object-fit:cover; }
  .a-handle { font-size:32px; font-weight:600; color:#fff; }
  .a-time { font-size:32px; color:#8e8e93; }

  .bubbles { position:relative; width:620px; height:400px; }
  .bubble {
    position:absolute; background:#1c1c1e; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:62px;
    box-shadow:0 15px 40px rgba(0,0,0,.4);
  }
  .bubble.lg { width:165px; height:165px; font-size:72px; }
  .bubble.sm { width:145px; height:145px; }
  .bubble.plus { color:#fff; font-size:84px; font-weight:300; }
  .b-top { top:-20px; left:50%; transform:translateX(-50%); }
  .b-left { top:95px; left:10px; }
  .b-right { top:95px; right:10px; }
  .b-bl { bottom:0; left:130px; }
  .b-br { bottom:0; right:130px; }
</style>
</head>
<body>
  <div id="stage">
    <div class="card-stack" id="cardStack"></div>
    <div class="attrib">
      <div class="a-icon" id="aIcon"><span id="aIconText">ACM</span></div>
      <span class="a-handle" id="aHandle">ituacmsc</span>
      <span class="a-time" id="aTime">now</span>
    </div>
    <div class="bubbles">
      <div class="bubble lg b-top" id="b1">⚡</div>
      <div class="bubble sm b-left" id="b0">💻</div>
      <div class="bubble sm plus b-right">+</div>
      <div class="bubble sm b-bl" id="b2">🤖</div>
      <div class="bubble sm b-br" id="b3">🔥</div>
    </div>
  </div>
</body>
</html>
